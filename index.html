<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Time Capsule</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>Digital Time Capsule</h1>
        </div>
        <div class="nav-actions">
            <button class="btn btn-export" id="exportBtn" title="Export Capsules">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span class="btn-text">Export</span>
            </button>
            <button class="btn btn-import" id="importBtn" title="Import Capsules">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span class="btn-text">Import</span>
            </button>
            <input type="file" id="importInput" accept=".json" hidden>
            <button class="btn btn-danger" id="clearAllBtn" title="Clear All Capsules">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                <span class="btn-text">Clear All</span>
            </button>
            <button class="btn btn-create" id="createCapsuleBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span class="btn-text">New Capsule</span>
            </button>
            <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <section class="dashboard">
            <div class="stat-card" data-stat="total">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="21" x2="9" y2="9"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="totalCapsules">0</span>
                    <span class="stat-label">Total Capsules</span>
                </div>
            </div>
            <div class="stat-card" data-stat="locked">
                <div class="stat-icon locked">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="lockedCapsules">0</span>
                    <span class="stat-label">Locked</span>
                </div>
            </div>
            <div class="stat-card" data-stat="unlocked">
                <div class="stat-icon unlocked">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="unlockedCapsules">0</span>
                    <span class="stat-label">Unlocked</span>
                </div>
            </div>
            <div class="stat-card" data-stat="public">
                <div class="stat-icon public">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="publicCapsules">0</span>
                    <span class="stat-label">Public</span>
                </div>
            </div>
            <div class="stat-card" data-stat="private">
                <div class="stat-icon private">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="privateCapsules">0</span>
                    <span class="stat-label">Private</span>
                </div>
            </div>
        </section>

        <section class="controls">
            <div class="search-container">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search by title, message, or notes..." class="search-input">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="locked">Locked</button>
                <button class="filter-btn" data-filter="unlocked">Unlocked</button>
                <button class="filter-btn" data-filter="public">Public</button>
                <button class="filter-btn" data-filter="private">Private</button>
            </div>
        </section>

        <section class="capsules-grid" id="capsulesContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-illustration">
                    <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 8v13H3V8"/>
                        <path d="M1 3h22v5H1z"/>
                        <path d="M10 12h4"/>
                    </svg>
                </div>
                <h2>No Time Capsules Yet</h2>
                <p>Create your first digital time capsule to preserve memories for your future self.</p>
                <button class="btn btn-create" id="emptyStateBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Create Your First Capsule
                </button>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="capsuleModal">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Capsule</h2>
                <button class="modal-close" id="modalClose">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="capsuleForm" class="modal-body">
                <div class="form-group">
                    <label for="title">Capsule Title *</label>
                    <input type="text" id="title" name="title" placeholder="Give your capsule a meaningful name..." required>
                    <span class="error-message" id="titleError"></span>
                </div>

                <div class="form-group">
                    <label for="message">Personal Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Write a message to your future self..."></textarea>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="Add any additional notes..."></textarea>
                </div>

                <div class="form-group">
                    <label for="unlockDateTime">Unlock Date & Time *</label>
                    <input type="datetime-local" id="unlockDateTime" name="unlockDateTime" required>
                    <span class="error-message" id="dateError"></span>
                </div>

                <div class="form-group">
                    <label>Images</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <input type="file" id="imageInput" accept="image/*" multiple hidden>
                        <div class="upload-placeholder">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <p>Click to upload or drag and drop</p>
                            <span>PNG, JPG, GIF up to 5MB each</span>
                        </div>
                    </div>
                    <div class="image-previews" id="imagePreviews"></div>
                </div>

                <div class="form-group">
                    <label>Visibility</label>
                    <div class="visibility-options">
                        <label class="radio-option">
                            <input type="radio" name="visibility" value="private" checked>
                            <span class="radio-custom"></span>
                            <div class="option-content">
                                <span class="option-title">Private</span>
                                <span class="option-desc">Only you can see this capsule</span>
                            </div>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="visibility" value="public">
                            <span class="radio-custom"></span>
                            <div class="option-content">
                                <span class="option-title">Public</span>
                                <span class="option-desc">Visible to everyone</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-create" id="submitBtn">Create Capsule</button>
                </div>
            </form>
        </div>
    </div>

    <div class="view-modal-overlay" id="viewModalOverlay">
        <div class="view-modal" id="viewModal">
            <div class="modal-header">
                <h2 id="viewModalTitle">View Capsule</h2>
                <button class="modal-close" id="viewModalClose">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="view-modal-body" id="viewModalBody"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="/main.js"></script>
</body>
</html>
